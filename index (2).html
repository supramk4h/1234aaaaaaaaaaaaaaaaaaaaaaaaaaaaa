<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fusion Canvas</title>
  <style>
    /* ----- DESIGN TOKENS ----- */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    /* Allow text selection in editable areas */
    .note-body[contenteditable="true"],
    input,
    select,
    textarea {
      -webkit-user-select: text;
      -khtml-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }

    :root {
      --bg: #0d0c14;
      --surface: #16141f;
      --surface2: #1e1b2a;
      --border: #2a2637;
      --border-strong: #3a3550;
      --text: #ede9ff;
      --text-muted: #8882a8;
      --text-faint: #4a4566;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.22);
      --dot-color: rgba(99, 102, 241, 0.1);
      --danger: #ef4444;
      --warn: #f59e0b;
      --font-display: "Syne", sans-serif;
      --font-body: "DM Sans", sans-serif;
      --font-note: Georgia, "Cambria", "Times New Roman", serif;
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4), 0 1px 6px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5), 0 2px 8px rgba(0, 0, 0, 0.3);
      --radius: 14px;
      --radius-sm: 8px;
      --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      --toolbar-h: 58px;
      --toolbox-w: 88px;
    }

    [data-theme="light"] {
      --bg: #f0eff5;
      --surface: #ffffff;
      --surface2: #f5f4fa;
      --border: #e0ddef;
      --border-strong: #c9c6df;
      --text: #1a1726;
      --text-muted: #7b778f;
      --text-faint: #b0adc4;
      --dot-color: rgba(99, 102, 241, 0.13);
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.06), 0 4px 16px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.1), 0 1px 4px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      transition: background var(--transition), color var(--transition);
    }

    svg {
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      width: 18px;
      height: 18px;
      display: block;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
      font-family: inherit;
    }

    /* ----- TOOLBAR ----- */
    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--toolbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      gap: 8px;
      z-index: 1000;
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: background var(--transition), border-color var(--transition);
    }

    .toolbar-left,
    .toolbar-center,
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.3px;
      color: var(--text);
      margin-right: 8px;
      white-space: nowrap;
    }

    .brand-icon {
      font-size: 20px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 6px var(--accent-glow));
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all var(--transition);
      position: relative;
      flex-shrink: 0;
    }

    .icon-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .icon-btn:active {
      transform: scale(0.93);
    }

    .icon-btn.active {
      background: var(--accent-glow);
      color: var(--accent);
    }

    .icon-btn:disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .zoom-label {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 46px;
      text-align: center;
      user-select: none;
    }

    .divider {
      width: 1px;
      height: 22px;
      background: var(--border);
      margin: 0 2px;
      flex-shrink: 0;
    }

    .theme-btn .sun-icon {
      display: block;
    }

    .theme-btn .moon-icon {
      display: none;
    }

    [data-theme="dark"] .theme-btn .sun-icon {
      display: none;
    }

    [data-theme="dark"] .theme-btn .moon-icon {
      display: block;
    }

    /* ----- LEFT TOOLBOX ----- */
    #toolbox {
      position: fixed;
      top: var(--toolbar-h);
      left: 0;
      bottom: 0;
      width: var(--toolbox-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 12px 8px;
      gap: 12px;
      z-index: 900;
      overflow-y: auto;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }

    #toolbox.hidden {
      transform: translateX(-100%);
    }

    .tool-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .tool-group:last-child {
      border-bottom: none;
    }

    .tool-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .preset-colors {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .color-swatch {
      width: 100%;
      height: 22px;
      border-radius: 5px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all var(--transition);
    }

    .color-swatch:hover {
      transform: scale(1.12);
    }

    .color-swatch.active {
      border-color: var(--text);
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px currentColor;
    }

    .custom-color-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }

    .custom-color-input {
      width: 30px;
      height: 22px;
      border: none;
      border-radius: 5px;
      padding: 0;
      cursor: pointer;
      background: none;
    }

    .font-selector {
      width: 100%;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      font-size: 11px;
      color: var(--text);
      outline: none;
      transition: border-color var(--transition);
    }

    .font-selector:focus {
      border-color: var(--accent);
    }

    /* ----- MAIN CANVAS ----- */
    #canvas-wrap {
      position: fixed;
      top: var(--toolbar-h);
      left: var(--toolbox-w);
      right: 0;
      bottom: 0;
      overflow: hidden;
      background: var(--bg);
      transition: background var(--transition);
      cursor: default;
      touch-action: none; /* Prevent default touch behaviors like scrolling */
    }

    #canvas-wrap.mode-create {
      cursor: crosshair;
    }

    #canvas-wrap.mode-pan {
      cursor: grab;
    }

    #canvas-wrap.mode-pan.panning {
      cursor: grabbing;
    }

    #canvas-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, var(--dot-color) 1.5px, transparent 1.5px);
      background-size: var(--grid-size, 32px) var(--grid-size, 32px);
      background-position: var(--grid-x, 0px) var(--grid-y, 0px);
      transition: background-image var(--transition);
    }

    #viewport {
      position: absolute;
      inset: 0;
      overflow: visible;
      z-index: 1;
    }

    #world {
      position: absolute;
      transform-origin: 0 0;
      will-change: transform;
      user-select: none;
    }

    /* ----- NOTES (TEXT BOXES) ----- */
    .note {
      position: absolute;
      left: 0;
      top: 0;
      min-width: 180px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      transition: box-shadow var(--transition), border-color var(--transition), opacity 0.18s ease, transform 0.18s ease;
      overflow: hidden;
      pointer-events: all;
      will-change: transform;
    }

    .note:hover:not(.locked) {
      box-shadow: var(--shadow-lg);
    }

    .note.selected {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-lg) !important;
    }

    .note.focused {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow), var(--shadow-lg);
    }

    .note.locked {
      opacity: 0.85;
      cursor: not-allowed;
    }

    .note.is-searching-match {
      border-color: var(--warn);
      box-shadow: 0 0 0 1px var(--warn), 0 0 24px rgba(245, 158, 11, 0.25);
    }

    .note::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--box-accent, var(--accent));
      transition: background var(--transition);
    }

    .note-hdr {
      display: flex;
      align-items: center;
      padding: 8px 10px 6px;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      cursor: move;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .note-hdr.grabbing {
      cursor: grabbing;
    }

    .note-title {
      flex: 1;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13px;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      min-width: 0;
    }

    .note-title::placeholder {
      color: var(--text-faint);
    }

    .note-color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--box-accent, var(--accent));
    }

    .note-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .note-action-btn {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      transition: all var(--transition);
    }

    .note-action-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .note-action-btn.delete-btn:hover {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
    }

    .note-body {
      flex: 1;
      padding: 10px 12px;
      overflow-y: auto;
      font-family: var(--font-note);
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
      outline: none;
      word-break: break-word;
      cursor: text;
      user-select: text;
      -webkit-user-select: text;
    }

    .note-body:empty::before {
      content: attr(data-placeholder);
      color: var(--text-faint);
      pointer-events: none;
      font-style: italic;
    }

    .note-body ul {
      padding-left: 22px;
      list-style: disc;
    }

    .note-body ol {
      padding-left: 22px;
      list-style: decimal;
    }

    .note-rsz {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 24px;
      height: 24px;
      cursor: nwse-resize;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 5px;
      pointer-events: all;
    }

    .note-rsz svg {
      width: 10px;
      height: 10px;
      color: var(--text-muted);
      opacity: 0.6;
    }

    @keyframes noteIn {
      from {
        opacity: 0;
        transform: translate(0, 0) scale(0.86);
      }
      to {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
    }

    .note.entering {
      animation: noteIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* ----- SELECTION RECTANGLE ----- */
    #selection-rect {
      position: fixed;
      z-index: 400;
      background: rgba(99, 102, 241, 0.15);
      border: 2px solid var(--accent);
      border-radius: 4px;
      pointer-events: none;
      display: none;
    }

    /* ----- FLOATING FORMAT BAR ----- */
    #format-bar {
      position: fixed;
      z-index: 500;
      display: none;
      align-items: center;
      gap: 2px;
      padding: 5px 8px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 40px;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      white-space: nowrap;
    }

    #format-bar.visible {
      display: flex;
    }

    .fmt-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      transition: all var(--transition);
    }

    .fmt-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .fmt-btn.active {
      background: var(--accent-glow);
      color: var(--accent);
    }

    .fmt-divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 4px;
    }

    .fmt-select {
      height: 28px;
      padding: 0 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      font-size: 11px;
      color: var(--text);
      outline: none;
    }

    .fmt-color-wrap {
      position: relative;
      width: 28px;
      height: 28px;
    }

    .fmt-color-wrap input[type="color"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      border: none;
      padding: 0;
    }

    .fmt-color-label {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      color: var(--text-muted);
      transition: background var(--transition), color var(--transition);
    }

    .fmt-color-wrap:hover .fmt-color-label {
      background: var(--surface2);
      color: var(--text);
    }

    /* ----- SEARCH PANEL ----- */
    #search-panel {
      position: fixed;
      top: 72px;
      right: 16px;
      z-index: 450;
      display: none;
      flex-direction: column;
      gap: 8px;
      width: 280px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
    }

    #search-panel.open {
      display: flex;
    }

    .sp-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #sp-input {
      flex: 1;
      height: 32px;
      padding: 0 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color var(--transition);
    }

    #sp-input:focus {
      border-color: var(--accent);
    }

    #sp-input::placeholder {
      color: var(--text-faint);
    }

    .sp-close {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all var(--transition);
    }

    .sp-close:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .sp-meta {
      font-size: 11px;
      color: var(--text-muted);
      min-height: 16px;
    }

    .sp-nav {
      display: flex;
      gap: 4px;
    }

    .sp-nav button {
      flex: 1;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .sp-nav button:hover {
      background: var(--surface);
      color: var(--text);
    }

    /* ----- FONT MANAGER PANEL ----- */
    #font-panel {
      position: absolute;
      top: 72px;
      left: 16px;
      z-index: 450;
      display: none;
      flex-direction: column;
      width: 300px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      overflow: hidden;
    }

    #font-panel.open {
      display: flex;
    }

    .fp-header {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      cursor: move;
    }

    .fp-title {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .fp-upload-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      height: 28px;
      padding: 0 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .fp-upload-btn:hover {
      opacity: 0.88;
    }

    .fp-close-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all var(--transition);
    }

    .fp-close-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .fp-list {
      max-height: 320px;
      overflow-y: auto;
      padding: 6px 0;
    }

    .fp-empty {
      padding: 28px 16px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .fp-empty svg {
      width: 32px;
      height: 32px;
      color: var(--text-muted);
      opacity: 0.4;
      display: block;
      margin: 0 auto 10px;
    }

    .fp-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      transition: background var(--transition);
    }

    .fp-item:hover {
      background: var(--surface2);
    }

    .fp-item-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      min-width: 0;
    }

    .fp-item-meta {
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .fp-item-delete {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .fp-item-delete:hover {
      background: var(--surface);
      color: var(--danger);
    }

    .fp-footer {
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-faint);
    }

    #font-panel.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), var(--shadow-lg);
    }

    /* ----- MINI MAP ----- */
    #minimap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      z-index: 900;
      overflow: hidden;
      transition: background var(--transition), border-color var(--transition);
    }

    .minimap-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .minimap-toggle {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      font-size: 16px;
      line-height: 1;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .minimap-toggle:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .minimap-canvas {
      width: 100%;
      height: 130px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--bg);
    }

    #minimap.collapsed .minimap-canvas {
      display: none;
    }

    .minimap-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      transform: translate(-50%, -50%);
      cursor: pointer;
      transition: transform 0.1s;
    }

    .minimap-dot:hover {
      transform: translate(-50%, -50%) scale(1.4);
    }

    .minimap-viewport {
      position: absolute;
      border: 1.5px solid var(--accent);
      border-radius: 2px;
      background: var(--accent-glow);
      pointer-events: none;
    }

    /* ----- STATUS BAR ----- */
    #status-bar {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-size: 11px;
      color: var(--text-muted);
      pointer-events: none;
      white-space: nowrap;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    #status-mode {
      font-weight: 500;
      color: var(--text);
    }

    /* ----- TOAST ----- */
    #toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      background: var(--text);
      color: var(--bg);
      padding: 9px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      animation: toastIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      white-space: nowrap;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.success {
      background: var(--accent);
      color: #fff;
    }

    .toast.warn {
      background: var(--warn);
      color: #fff;
    }

    .toast.out {
      animation: toastOut 0.2s ease forwards;
    }

    .toast-action {
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .toast-action:hover {
      opacity: 0.85;
    }

    .toast-action.hidden {
      display: none;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateY(6px) scale(0.95);
      }
    }

    /* ----- SAVE INDICATOR ----- */
    #save-dot {
      position: fixed;
      top: 18px;
      right: 16px;
      z-index: 1001;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      opacity: 0;
      transition: opacity 400ms ease, background 400ms ease;
      pointer-events: none;
    }

    #save-dot.saving {
      opacity: 1;
      background: var(--warn);
    }

    #save-dot.saved {
      opacity: 1;
      background: #22c55e;
    }

    /* ----- SCROLLBAR ----- */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-faint);
    }

    /* ----- MOBILE TOOLBOX ----- */
    #mobile-toolbox {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      transform: translateY(100%);
      transition: transform var(--transition);
      z-index: 1000;
      max-height: 60vh;
      overflow-y: auto;
      display: none;
    }

    #mobile-toolbox.open {
      transform: translateY(0);
    }

    .mobile-toolbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      color: var(--text);
    }

    .mobile-toolbox-close {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      background: none;
      border: none;
      transition: all var(--transition);
    }

    .mobile-toolbox-close:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .mobile-toolbox-content {
      padding: 16px;
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 680px) {
      :root {
        --toolbox-w: 0px;
      }
      #toolbox {
        display: none;
      }
      #canvas-wrap {
        left: 0;
      }
      .brand-name {
        display: none;
      }
      .toolbar-center .zoom-label {
        display: none;
      }
      #minimap {
        display: none;
      }
      #mobile-toolbox {
        display: none; /* Hide old mobile toolbox */
      }
      #search-panel {
        display: none; /* Hide search panel on mobile */
      }
      #font-panel {
        display: none; /* Hide font panel on mobile */
      }
      .mobile-hamburger {
        display: block;
      }
      #toolboxBtn {
        display: none; /* Hide toolbox button on mobile */
      }
    }

    @media (max-width: 500px) {
      #toolbar {
        flex-wrap: wrap;
        height: auto;
        padding: 6px 8px;
      }
      .tb-center,
      .tb-right {
        flex-wrap: wrap;
        justify-content: center;
      }
      .icon-btn {
        width: 40px;
        height: 40px;
      }
      .mobile-toolbox-content {
        padding: 20px;
      }
      .preset-colors {
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .color-swatch {
        width: 32px;
        height: 32px;
      }
      .note-action-btn {
        width: 32px;
        height: 32px;
      }
    }

    /* Better touch scrolling */
    #mobile-toolbox {
      -webkit-overflow-scrolling: touch;
    }

    /* Hamburger Menu Styles */
    .hamburger-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg);
      z-index: 2000; /* Higher than toolbar */
      display: none;
      flex-direction: column;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .hamburger-overlay.open {
      display: flex;
    }

    .hamburger-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .hamburger-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hamburger-brand .brand-icon {
      font-size: 20px;
      color: var(--accent);
    }

    .hamburger-brand .brand-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .hamburger-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background var(--transition);
    }

    .hamburger-close:hover {
      background: var(--hover);
    }

    .hamburger-close svg {
      width: 20px;
      height: 20px;
    }

    .hamburger-content {
      flex: 1;
      padding: 20px;
    }

    .hamburger-section {
      margin-bottom: 32px;
    }

    .hamburger-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      padding-left: 4px;
    }

    .hamburger-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hamburger-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      transition: all var(--transition);
      font-size: 12px;
      font-weight: 500;
      text-align: center;
    }

    .hamburger-btn:hover {
      background: var(--hover);
      border-color: var(--accent);
    }

    .hamburger-btn:active {
      background: var(--active);
    }

    .hamburger-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hamburger-btn svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .hamburger-tools .tool-group {
      margin-bottom: 20px;
    }

    .hamburger-tools .tool-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 12px;
    }

    .hamburger-tools .preset-colors {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .hamburger-tools .color-swatch {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all var(--transition);
    }

    .hamburger-tools .color-swatch.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--bg);
    }

    .hamburger-tools .custom-color-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hamburger-tools .custom-color-input {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .hamburger-tools .font-selector {
      width: 100%;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
    }

    /* Mobile hamburger button */
    .mobile-hamburger {
      display: none;
    }

    /* Prevent zoom on input focus on iOS */
    input[type="color"],
    input[type="text"],
    select {
      font-size: 16px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- TOP TOOLBAR -->
  <header id="toolbar">
    <div class="toolbar-left">
      <div class="brand">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">Fusion Canvas</span>
      </div>
      <div class="divider"></div>
      <button class="icon-btn" id="undoBtn" title="Undo (Ctrl+Z)" disabled>
        <svg viewBox="0 0 24 24"><path d="M3 10h10a6 6 0 0 1 0 12H9"/><polyline points="3 10 7 6 3 2"/></svg>
      </button>
      <button class="icon-btn" id="redoBtn" title="Redo (Ctrl+Y)" disabled>
        <svg viewBox="0 0 24 24"><path d="M21 10H11A6 6 0 0 0 5 22h4"/><polyline points="21 10 17 6 21 2"/></svg>
      </button>
    </div>

    <div class="toolbar-center">
      <button class="icon-btn" id="zoomOutBtn" title="Zoom Out (-)">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      </button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button class="icon-btn" id="zoomInBtn" title="Zoom In (+)">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      </button>
      <button class="icon-btn" id="fitBtn" title="Fit to Screen (F)">
        <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
      <button class="icon-btn" id="resetBtn" title="Reset View (R)">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
      <button class="icon-btn" id="toolboxBtn" title="Toggle toolbox">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
      </button>
      <button class="icon-btn mobile-hamburger" id="hamburgerBtn" title="Menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="divider"></div>
      <button class="icon-btn" id="modePan" title="Pan mode (V)">
        <svg viewBox="0 0 24 24"><path d="M18 11V6a2 2 0 0 0-4 0v1M14 7V4a2 2 0 0 0-4 0v1M10 8a2 2 0 0 0-4 0v3M18 11a2 2 0 1 1 4 0v3a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-6-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>
      </button>
      <button class="icon-btn" id="modeCreate" title="Create mode (C)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </button>
    </div>

    <div class="toolbar-right">
      <button class="icon-btn" id="searchBtn" title="Search notes (F)">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      </button>
      <button class="icon-btn" id="fontMgrBtn" title="Custom fonts">
        <svg viewBox="0 0 24 24"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
      </button>
      <div class="divider"></div>
      <button class="icon-btn theme-btn" id="themeBtn" title="Toggle theme (T)">
        <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="divider"></div>
      <button class="icon-btn" id="exportBtn" title="Export board (E)">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="icon-btn" id="importBtn" title="Import board">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      <input type="file" id="fileInput" accept=".json" style="display:none" />
    </div>
  </header>

  <!-- LEFT TOOLBOX (color & font presets) -->
  <aside id="toolbox">
    <div class="tool-group">
      <label class="tool-label">Box color</label>
      <div class="preset-colors" id="presetColors">
        <button class="color-swatch active" data-color="#6366f1" style="background:#6366f1"></button>
        <button class="color-swatch" data-color="#ec4899" style="background:#ec4899"></button>
        <button class="color-swatch" data-color="#f59e0b" style="background:#f59e0b"></button>
        <button class="color-swatch" data-color="#10b981" style="background:#10b981"></button>
        <button class="color-swatch" data-color="#3b82f6" style="background:#3b82f6"></button>
        <button class="color-swatch" data-color="#ef4444" style="background:#ef4444"></button>
        <button class="color-swatch" data-color="#8b5cf6" style="background:#8b5cf6"></button>
        <button class="color-swatch" data-color="#14b8a6" style="background:#14b8a6"></button>
      </div>
      <div class="custom-color-row">
        <label class="tool-label" style="font-size:9px;">Custom</label>
        <input type="color" id="customColor" class="custom-color-input" value="#6366f1" />
      </div>
    </div>
    <div class="tool-group">
      <label class="tool-label">Default font</label>
      <select class="font-selector" id="globalFont">
        <option value="'DM Sans', sans-serif">DM Sans</option>
        <option value="'Syne', sans-serif">Syne</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="'Courier New', monospace">Courier New</option>
        <option value="Impact, sans-serif">Impact</option>
      </select>
    </div>
    <div class="tool-group">
      <div class="canvas-info">
        <span id="boxCount">0 notes</span>
      </div>
    </div>
  </aside>

  <!-- MAIN CANVAS -->
  <main id="canvas-wrap" class="mode-pan">
    <div id="viewport">
      <div id="world"></div>
    </div>
    <div id="selection-rect"></div>

    <!-- FLOATING FORMAT BAR -->
    <div id="format-bar">
      <select class="fmt-select" id="fmtFontFamily">
        <option value="">Default</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Arial">Arial</option>
        <option value="Courier New">Courier New</option>
      </select>
      <select class="fmt-select" id="fmtFontSize">
        <option value="10">10</option><option value="11">11</option><option value="12">12</option>
        <option value="13">13</option><option value="14">14</option><option value="15" selected>15</option>
        <option value="16">16</option><option value="18">18</option><option value="20">20</option>
        <option value="24">24</option><option value="28">28</option><option value="32">32</option>
        <option value="36">36</option><option value="48">48</option>
      </select>
      <div class="fmt-divider"></div>
      <button class="fmt-btn" data-cmd="bold" title="Bold"><strong>B</strong></button>
      <button class="fmt-btn" data-cmd="italic" title="Italic"><em>I</em></button>
      <button class="fmt-btn" data-cmd="underline" title="Underline"><u>U</u></button>
      <button class="fmt-btn" data-cmd="strikethrough" title="Strikethrough"><s>S</s></button>
      <div class="fmt-divider"></div>
      <button class="fmt-btn" data-cmd="justifyLeft" title="Align left">
        <svg viewBox="0 0 16 16"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="10" y2="8"/><line x1="2" y1="12" x2="12" y2="12"/></svg>
      </button>
      <button class="fmt-btn" data-cmd="justifyCenter" title="Align center">
        <svg viewBox="0 0 16 16"><line x1="2" y1="4" x2="14" y2="4"/><line x1="4" y1="8" x2="12" y2="8"/><line x1="3" y1="12" x2="13" y2="12"/></svg>
      </button>
      <button class="fmt-btn" data-cmd="justifyRight" title="Align right">
        <svg viewBox="0 0 16 16"><line x1="2" y1="4" x2="14" y2="4"/><line x1="6" y1="8" x2="14" y2="8"/><line x1="4" y1="12" x2="14" y2="12"/></svg>
      </button>
      <div class="fmt-divider"></div>
      <button class="fmt-btn" data-cmd="insertUnorderedList" title="Bullet list">
        <svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5"/><circle cx="4" cy="12" r="1.5"/><circle cx="4" cy="18" r="1.5"/></svg>
      </button>
      <button class="fmt-btn" data-cmd="insertOrderedList" title="Numbered list">
        <svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4M4 10h2"/><path d="M6 14H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
      </button>
      <div class="fmt-divider"></div>
      <div class="fmt-color-wrap">
