      // Hamburger menu tools events
      dom.hamburgerPresetColors.querySelectorAll('.color-swatch').forEach(sw => {
        sw.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
        sw.addEventListener('touchend', () => {
          dom.hamburgerPresetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          sw.classList.add('active');
          S.selectedColor = sw.dataset.color;
          dom.hamburgerCustomColor.value = sw.dataset.color;
          dom.customColor.value = sw.dataset.color; // Sync with desktop
          dom.mobileCustomColor.value = sw.dataset.color; // Sync with mobile
          dom.presetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          dom.presetColors.querySelector(`[data-color="${sw.dataset.color}"]`).classList.add('active');
          dom.mobilePresetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          dom.mobilePresetColors.querySelector(`[data-color="${sw.dataset.color}"]`).classList.add('active');
          if (S.selectedIds.size === 1) {
            const id = Array.from(S.selectedIds)[0];
            applyColorToNote(id, S.selectedColor);
          }
        }, { passive: false });
        sw.addEventListener('click', () => {
          dom.hamburgerPresetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          sw.classList.add('active');
          S.selectedColor = sw.dataset.color;
          dom.hamburgerCustomColor.value = sw.dataset.color;
          dom.customColor.value = sw.dataset.color; // Sync with desktop
          dom.mobileCustomColor.value = sw.dataset.color; // Sync with mobile
          dom.presetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          dom.presetColors.querySelector(`[data-color="${sw.dataset.color}"]`).classList.add('active');
          dom.mobilePresetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          dom.mobilePresetColors.querySelector(`[data-color="${sw.dataset.color}"]`).classList.add('active');
          if (S.selectedIds.size === 1) {
            const id = Array.from(S.selectedIds)[0];
            applyColorToNote(id, S.selectedColor);
          }
        });
      });
      dom.hamburgerCustomColor.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
      dom.hamburgerCustomColor.addEventListener('input', () => {
        S.selectedColor = dom.hamburgerCustomColor.value;
        dom.customColor.value = dom.hamburgerCustomColor.value; // Sync with desktop
        dom.mobileCustomColor.value = dom.hamburgerCustomColor.value; // Sync with mobile
        dom.hamburgerPresetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        dom.presetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        dom.mobilePresetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        if (S.selectedIds.size === 1) {
          const id = Array.from(S.selectedIds)[0];
          applyColorToNote(id, S.selectedColor);
        }
      });
      dom.hamburgerGlobalFont.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
      dom.hamburgerGlobalFont.addEventListener('change', () => {
        S.defaultFont = dom.hamburgerGlobalFont.value;
        dom.globalFont.value = dom.hamburgerGlobalFont.value; // Sync with desktop
        dom.mobileGlobalFont.value = dom.hamburgerGlobalFont.value; // Sync with mobile
        if (S.selectedIds.size === 1) {
          const id = Array.from(S.selectedIds)[0];
          const note = S.notes.get(id);
          if (note) {
            note.font = S.defaultFont;
            note.el.style.fontFamily = S.defaultFont;
            pushHistory();
            scheduleAutoSave();
          }
        }
      });

      // Minimap toggle
      dom.minimapToggle.addEventListener('click', () => {
        dom.minimap.classList.toggle('collapsed');
        dom.minimapToggle.textContent = dom.minimap.classList.contains('collapsed') ? '+' : '−';
      });

      // Minimap click to pan
      dom.minimapCanvas.addEventListener('click', (e) => {
        if (e.target.classList.contains('minimap-dot')) return;
        const rect = dom.minimapCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const notes = Array.from(S.notes.values());
        if (notes.length === 0) return;
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        notes.forEach(n => {
          minX = Math.min(minX, n.x);
          minY = Math.min(minY, n.y);
          maxX = Math.max(maxX, n.x + n.w);
          maxY = Math.max(maxY, n.y + n.h);
        });
        const pad = 60;
        minX -= pad; minY -= pad; maxX += pad; maxY += pad;
        const worldW = maxX - minX; const worldH = maxY - minY;
        const sc = Math.min(rect.width / worldW, rect.height / worldH);
        const worldX = mx / sc + minX;
        const worldY = my / sc + minY;
        const canvasRect = dom.canvasWrap.getBoundingClientRect();
        S.panX = canvasRect.width / 2 - worldX * S.scale;
        S.panY = canvasRect.height / 2 - worldY * S.scale;
        applyTransform();
      });

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        const isEditing = document.activeElement && (
          document.activeElement.tagName === 'INPUT' ||
          document.activeElement.tagName === 'TEXTAREA' ||
          document.activeElement.isContentEditable
        );

        if (isEditing) {
          if (e.key === 'Escape') {
            document.activeElement.blur();
            setMode('pan');
          }
          return;
        }

        if (e.ctrlKey || e.metaKey) {
          if (e.key === 'z' || e.key === 'Z') {
            e.preventDefault();
            e.shiftKey ? redo() : undo();
          }
          if (e.key === 'y' || e.key === 'Y') { e.preventDefault(); redo(); }
          if (e.key === 'a' || e.key === 'A') {
            e.preventDefault();
            S.selectedIds.clear();
            S.notes.forEach((_, id) => addToSelection(id));
          }
          return;
        }

        switch (e.key) {
          case 'v': case 'V': setMode('pan'); break;
          case 'c': case 'C': setMode('create'); break;
          case 'f': case 'F': toggleSearch(); break;
          case 't': case 'T': toggleTheme(); break;
          case 'e': case 'E': exportBoard(); break;
          case '+': case '=': zoomIn(); break;
          case '-': zoomOut(); break;
          case '0': resetView(); break;
          case 'Delete': case 'Backspace':
            if (S.selectedIds.size > 0) {
              Array.from(S.selectedIds).forEach(id => deleteNote(id));
            } else if (S.activeNoteId) {
              deleteNote(S.activeNoteId);
            }
            break;
          case 'Escape':
            closeSearch();
            clearSelection();
            break;
        }
      });

      // Font manager (simplified – integrate from Knowledge Canvas later)
      // For brevity, we'll just show a placeholder message.
      // In a full version, you'd include the complete FontManager code.
      // Here we just wire the panel open/close.
      dom.fontMgrBtn.addEventListener('click', toggleFontPanel); // Use defined function
      dom.fpCloseBtn.addEventListener('click', () => {
        fontPanelOpen = false;
        dom.fontPanel.classList.remove('open');
        dom.fontMgrBtn.classList.remove('active');
      });
      dom.fpCloseBtn.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
      dom.fpCloseBtn.addEventListener('touchend', () => {
        fontPanelOpen = false;
        dom.fontPanel.classList.remove('open');
        dom.fontMgrBtn.classList.remove('active');
      }, { passive: false });
      dom.fpUploadBtn.addEventListener('click', () => dom.fontFile.click());
      dom.fpUploadBtn.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
      dom.fpUploadBtn.addEventListener('touchend', () => dom.fontFile.click(), { passive: false });
      dom.fontFile.addEventListener('change', handleFontUpload);

      // Drag and drop for font files
      dom.fontPanel.addEventListener('dragover', (e) => {
        e.preventDefault();
        dom.fontPanel.classList.add('drag-over');
      });

      dom.fontPanel.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dom.fontPanel.classList.remove('drag-over');
      });

      dom.fontPanel.addEventListener('drop', (e) => {
        e.preventDefault();
        dom.fontPanel.classList.remove('drag-over');

        const files = Array.from(e.dataTransfer.files);
        if (files.length === 0) return;

        // Simulate file input change
        const fakeEvent = { target: { files } };
        handleFontUpload(fakeEvent);
      });

      // Font upload functionality
      let customFonts = JSON.parse(localStorage.getItem('fusion_custom_fonts') || '[]');

      function handleFontUpload(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        let uploadedCount = 0;
        const validExtensions = ['.ttf', '.otf', '.woff', '.woff2'];

        files.forEach(file => {
          const ext = file.name.toLowerCase().substring(file.name.lastIndexOf('.'));
          if (!validExtensions.includes(ext)) {
            showToast(`Invalid file type: ${file.name}`, { warn: true });
            return;
          }

          const reader = new FileReader();
          reader.onload = (event) => {
            const fontData = event.target.result;
            const fontName = file.name.replace(/\.[^/.]+$/, ''); // Remove extension
            const fontId = `custom-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;

            // Create font-face CSS
            const fontFace = new FontFace(fontName, `url(${fontData})`);
            fontFace.load().then(() => {
              document.fonts.add(fontFace);

              // Store font data
              const fontInfo = {
                id: fontId,
                name: fontName,
                data: fontData,
                originalName: file.name,
                uploadedAt: Date.now()
              };
              customFonts.push(fontInfo);
              localStorage.setItem('fusion_custom_fonts', JSON.stringify(customFonts));

              // Add to selectors
              addFontToSelectors(fontName);

              // Update UI
              updateFontList();

              uploadedCount++;
              if (uploadedCount === files.length) {
                showToast(`Uploaded ${uploadedCount} font${uploadedCount > 1 ? 's' : ''}`, { success: true });
              }
            }).catch(err => {
              console.error('Font loading failed:', err);
              showToast(`Failed to load font: ${fontName}`, { warn: true });
            });
          };
          reader.readAsDataURL(file);
        });

        e.target.value = '';
      }

      function addFontToSelectors(fontName) {
        // Add to desktop selector
        const desktopOption = document.createElement('option');
        desktopOption.value = fontName;
        desktopOption.textContent = fontName;
        dom.globalFont.appendChild(desktopOption);

        // Add to mobile selector
        const mobileOption = document.createElement('option');
        mobileOption.value = fontName;
        mobileOption.textContent = fontName;
        dom.mobileGlobalFont.appendChild(mobileOption);

        // Add to format bar selector
        const formatOption = document.createElement('option');
        formatOption.value = fontName;
        formatOption.textContent = fontName;
        dom.fmtFontFamily.appendChild(formatOption);
      }

      function updateFontList() {
        dom.fpList.innerHTML = '';

        if (customFonts.length === 0) {
          dom.fpEmpty.style.display = 'block';
          return;
        }

        dom.fpEmpty.style.display = 'none';

        customFonts.forEach(font => {
          const fontItem = document.createElement('div');
          fontItem.className = 'fp-item';
          fontItem.innerHTML = `
            <div class="fp-item-name" style="font-family: '${font.name}'">${font.name}</div>
            <div class="fp-item-meta">${font.originalName}</div>
            <button class="fp-item-delete" data-id="${font.id}" title="Delete font">
              <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          `;
          dom.fpList.appendChild(fontItem);
        });

        // Add delete event listeners
        dom.fpList.querySelectorAll('.fp-item-delete').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const fontId = e.currentTarget.dataset.id;
            deleteCustomFont(fontId);
          });
          btn.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
        });
      }

      function deleteCustomFont(fontId) {
        const fontIndex = customFonts.findIndex(f => f.id === fontId);
        if (fontIndex === -1) return;

        const font = customFonts[fontIndex];

        // Remove from selectors
        [dom.globalFont, dom.mobileGlobalFont, dom.fmtFontFamily].forEach(selector => {
          const option = selector.querySelector(`option[value="${font.name}"]`);
          if (option) option.remove();
        });

        // Remove from storage
        customFonts.splice(fontIndex, 1);
        localStorage.setItem('fusion_custom_fonts', JSON.stringify(customFonts));

        // Update UI
        updateFontList();
        showToast(`Deleted font: ${font.name}`, { success: true });
      }

      // Load custom fonts on init
      function loadCustomFonts() {
        customFonts.forEach(font => {
          // Recreate font-face
          const fontFace = new FontFace(font.name, `url(${font.data})`);
          fontFace.load().then(() => {
            document.fonts.add(fontFace);
            addFontToSelectors(font.name);
          }).catch(err => {
            console.warn('Failed to reload font:', font.name, err);
          });
        });
        updateFontList();
      }

      // Font panel dragging
      let fontPanelDragging = false;
      let fontPanelDragStartX = 0;
      let fontPanelDragStartY = 0;
      let fontPanelStartX = 0;
      let fontPanelStartY = 0;

      dom.fpHeader.addEventListener('mousedown', (e) => {
        if (e.target.closest('.fp-close-btn') || e.target.closest('.fp-upload-btn')) return;
        fontPanelDragging = true;
        fontPanelDragStartX = e.clientX;
        fontPanelDragStartY = e.clientY;
        const rect = dom.fontPanel.getBoundingClientRect();
        fontPanelStartX = rect.left;
        fontPanelStartY = rect.top;
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!fontPanelDragging) return;
        const dx = e.clientX - fontPanelDragStartX;
        const dy = e.clientY - fontPanelDragStartY;
        dom.fontPanel.style.left = (fontPanelStartX + dx) + 'px';
        dom.fontPanel.style.top = (fontPanelStartY + dy) + 'px';
      });

      document.addEventListener('mouseup', () => {
        fontPanelDragging = false;
      });

      // ---------- INIT ----------
      function init() {
        // Load theme preference
        const savedTheme = localStorage.getItem('fusion_theme');
        if (savedTheme) setTheme(savedTheme);
        else setTheme('dark');

        // Load board from storage
        loadFromStorage();

        // Load custom fonts
        loadCustomFonts();

        // Apply initial transform
        applyTransform();

        // Update counts
        updateCount();

        // Sync mobile toolbox with desktop values
        dom.mobileCustomColor.value = dom.customColor.value;
        dom.mobileGlobalFont.value = dom.globalFont.value;
        dom.mobilePresetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        dom.presetColors.querySelectorAll('.color-swatch').forEach(s => {
          if (s.classList.contains('active')) {
            dom.mobilePresetColors.querySelector(`[data-color="${s.dataset.color}"]`).classList.add('active');
          }
        });

        // Push initial history snapshot
        pushHistory();

        // Start RAF loop
        function tick() {
          applyTransform();
          requestAnimationFrame(tick);
        }
        tick();
      }

      init();
    })();
  </script>
