  <script>
    (function() {
      'use strict';

      // ---------- CONSTANTS ----------
      const CFG = {
        MIN_SCALE: 0.15,
        MAX_SCALE: 4,
        GRID_BASE: 32,
        NOTE_MIN_W: 180,
        NOTE_MIN_H: 120,
        NOTE_DEFAULT_W: 260,
        NOTE_DEFAULT_H: 160,
        SAVE_DELAY: 700,
        STORE_KEY: 'fusion_canvas_v1',
        CV_OFFSET: 0, // world origin at 0,0
      };

      // ---------- GLOBAL STATE ----------
      const S = {
        notes: new Map(),          // id -> note object
        nextId: 1,
        mode: 'pan',               // 'pan' or 'create'
        panX: 0, panY: 0, scale: 1,
        // Selection
        selectedIds: new Set(),
        // Drag
        dragging: false, dragId: null, dragStartX: 0, dragStartY: 0, dragNoteStartX: 0, dragNoteStartY: 0,
        // Resize
        resizing: false, resizeId: null, resizeStartX: 0, resizeStartY: 0, resizeStartW: 0, resizeStartH: 0,
        // Pan
        panning: false, panStartX: 0, panStartY: 0, panStartPanX: 0, panStartPanY: 0,
        // Lasso
        lassoActive: false, lassoStart: { x: 0, y: 0 }, lassoEnd: { x: 0, y: 0 },
        // Group drag
        groupDragActive: false, groupDragStart: { x: 0, y: 0 }, groupDragOffsets: new Map(),
        // Pinch zoom
        pinchCenterX: 0, pinchCenterY: 0,
        // Active editing note
        activeNoteId: null,
        // History
        history: [],
        historyIndex: -1,
        // Colors / font
        selectedColor: '#6366f1',
        defaultFont: "'DM Sans', sans-serif",
        // Theme
        theme: 'dark',
        // Auto-save timer
        saveTimer: null,
        // RAF for move events
        rafId: null, pendX: 0, pendY: 0, hasPend: false,
        // Undo for delete (single)
        deletedNoteBackup: null,
      };

      // ---------- DOM ELEMENTS ----------
      const dom = {
        world: document.getElementById('world'),
        viewport: document.getElementById('viewport'),
        canvasWrap: document.getElementById('canvas-wrap'),
        undoBtn: document.getElementById('undoBtn'),
        redoBtn: document.getElementById('redoBtn'),
        zoomInBtn: document.getElementById('zoomInBtn'),
        zoomOutBtn: document.getElementById('zoomOutBtn'),
        zoomLabel: document.getElementById('zoomLabel'),
        fitBtn: document.getElementById('fitBtn'),
        resetBtn: document.getElementById('resetBtn'),
        modePan: document.getElementById('modePan'),
        modeCreate: document.getElementById('modeCreate'),
        toolboxBtn: document.getElementById('toolboxBtn'),
        toolbox: document.getElementById('toolbox'),
        mobileToolbox: document.getElementById('mobile-toolbox'),
        mobilePresetColors: document.getElementById('mobilePresetColors'),
        mobileCustomColor: document.getElementById('mobileCustomColor'),
        mobileGlobalFont: document.getElementById('mobileGlobalFont'),
        mobileToolboxClose: document.getElementById('mobileToolboxClose'),
        searchBtn: document.getElementById('searchBtn'),
        fontMgrBtn: document.getElementById('fontMgrBtn'),
        themeBtn: document.getElementById('themeBtn'),
        exportBtn: document.getElementById('exportBtn'),
        importBtn: document.getElementById('importBtn'),
        fileInput: document.getElementById('fileInput'),
        presetColors: document.getElementById('presetColors'),
        customColor: document.getElementById('customColor'),
        globalFont: document.getElementById('globalFont'),
        formatBar: document.getElementById('format-bar'),
        fmtFontFamily: document.getElementById('fmtFontFamily'),
        fmtFontSize: document.getElementById('fmtFontSize'),
        fmtTextColor: document.getElementById('fmtTextColor'),
        searchPanel: document.getElementById('search-panel'),
        spInput: document.getElementById('sp-input'),
        spMeta: document.getElementById('sp-meta'),
        spClose: document.getElementById('sp-close'),
        spPrev: document.getElementById('sp-prev'),
        spNext: document.getElementById('sp-next'),
        fontPanel: document.getElementById('font-panel'),
        fpHeader: document.querySelector('.fp-header'),
        fpList: document.getElementById('fp-list'),
        fpEmpty: document.getElementById('fp-empty'),
        fpFooter: document.getElementById('fp-footer'),
        fpUploadBtn: document.getElementById('fp-upload-btn'),
        fpCloseBtn: document.getElementById('fp-close-btn'),
        fontFile: document.getElementById('font-file'),
        minimap: document.getElementById('minimap'),
        minimapCanvas: document.getElementById('minimapCanvas'),
        minimapViewport: document.getElementById('minimapViewport'),
        minimapToggle: document.getElementById('minimapToggle'),
        statusMode: document.getElementById('status-mode'),
        statusCount: document.getElementById('status-count'),
        toastContainer: document.getElementById('toast-container'),
        saveDot: document.getElementById('save-dot'),
        selectionRect: document.getElementById('selection-rect'),
        boxCount: document.getElementById('boxCount'),
        // Hamburger menu
        hamburgerBtn: document.getElementById('hamburgerBtn'),
        hamburgerMenu: document.getElementById('hamburger-menu'),
        hamburgerClose: document.getElementById('hamburgerClose'),
        hamburgerModePan: document.getElementById('hamburgerModePan'),
        hamburgerModeCreate: document.getElementById('hamburgerModeCreate'),
        hamburgerZoomIn: document.getElementById('hamburgerZoomIn'),
        hamburgerZoomOut: document.getElementById('hamburgerZoomOut'),
        hamburgerFit: document.getElementById('hamburgerFit'),
        hamburgerReset: document.getElementById('hamburgerReset'),
        hamburgerUndo: document.getElementById('hamburgerUndo'),
        hamburgerRedo: document.getElementById('hamburgerRedo'),
        hamburgerSearch: document.getElementById('hamburgerSearch'),
        hamburgerFontMgr: document.getElementById('hamburgerFontMgr'),
        hamburgerTheme: document.getElementById('hamburgerTheme'),
        hamburgerExport: document.getElementById('hamburgerExport'),
        hamburgerImport: document.getElementById('hamburgerImport'),
        hamburgerPresetColors: document.getElementById('hamburgerPresetColors'),
        hamburgerCustomColor: document.getElementById('hamburgerCustomColor'),
        hamburgerGlobalFont: document.getElementById('hamburgerGlobalFont'),
      };

      // ---------- UTILS ----------
      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
      function uid() { return 'note_' + (S.nextId++); }

      function throttle(fn, ms) {
        let last = 0;
        return function(...args) {
          const now = Date.now();
          if (now - last >= ms) { last = now; fn.apply(this, args); }
        };
      }

      // Simple HTML sanitizer (allow basic text formatting)
      function sanitize(html) {
        if (!html) return '';
        const doc = new DOMParser().parseFromString(html, 'text/html');
        // Allow only safe tags (p, span, b, i, u, s, ul, ol, li, br, div, etc.)
        const allowed = new Set(['P','SPAN','STRONG','B','EM','I','U','S','STRIKE','BR','UL','OL','LI','DIV','H1','H2','H3','H4','H5','H6']);
        const walk = (node) => {
          if (node.nodeType === 3) return node.cloneNode(false);
          if (node.nodeType !== 1) return null;
          if (!allowed.has(node.tagName)) {
            const frag = document.createDocumentFragment();
            node.childNodes.forEach(c => { const r = walk(c); if (r) frag.appendChild(r); });
            return frag;
          }
          const el = document.createElement(node.tagName);
          // Copy only inline styles (font, color, etc.)
          if (node.style) {
            ['font-size','font-family','color','font-weight','font-style','text-decoration','text-align'].forEach(prop => {
              const val = node.style.getPropertyValue(prop);
              if (val) el.style.setProperty(prop, val);
            });
          }
          node.childNodes.forEach(c => { const r = walk(c); if (r) el.appendChild(r); });
          return el;
        };
        const frag = document.createDocumentFragment();
        doc.body.childNodes.forEach(c => { const r = walk(c); if (r) frag.appendChild(r); });
        const div = document.createElement('div');
        div.appendChild(frag);
        return div.innerHTML;
      }

      function rgbToHex(rgb) {
        const m = rgb.match(/\d+/g);
        if (!m || m.length < 3) return '#ede9ff';
        return '#' + m.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
      }

      // ---------- HISTORY ----------
      function snapshot() {
        const boxes = {};
        S.notes.forEach((note, id) => {
          boxes[id] = {
            id, x: note.x, y: note.y, w: note.w, h: note.h,
            title: note.title, content: note.content, color: note.color, font: note.font, locked: note.locked,
          };
        });
        return { boxes, nextId: S.nextId };
      }

      function pushHistory() {
        S.history = S.history.slice(0, S.historyIndex + 1);
        S.history.push(snapshot());
        if (S.history.length > 80) S.history.shift();
        else S.historyIndex++;
        updateHistoryButtons();
      }

      function undo() {
        if (S.historyIndex <= 0) return;
        S.historyIndex--;
        restoreSnapshot(S.history[S.historyIndex]);
        showToast('Undone');
      }

      function redo() {
        if (S.historyIndex >= S.history.length - 1) return;
        S.historyIndex++;
        restoreSnapshot(S.history[S.historyIndex]);
        showToast('Redone');
      }

      function restoreSnapshot(snap) {
        // Clear current notes
        S.notes.forEach(n => n.el && n.el.remove());
        S.notes.clear();
        S.selectedIds.clear();
        S.activeNoteId = null;
        hideFormatBar();
        // Rebuild
        Object.values(snap.boxes).forEach(data => {
          const note = createNoteFromData(data);
          S.notes.set(note.id, note);
          renderNote(note, false);
        });
        S.nextId = snap.nextId;
        updateCount();
        updateMinimap();
        updateHistoryButtons();
      }

      function updateHistoryButtons() {
        dom.undoBtn.disabled = S.historyIndex <= 0;
        dom.redoBtn.disabled = S.historyIndex >= S.history.length - 1;
        dom.hamburgerUndo.disabled = S.historyIndex <= 0;
        dom.hamburgerRedo.disabled = S.historyIndex >= S.history.length - 1;
      }

      // ---------- NOTE CREATION / RENDERING ----------
      function createNoteData(x, y, color) {
        const id = uid();
        return {
          id,
          x, y,
          w: CFG.NOTE_DEFAULT_W,
          h: CFG.NOTE_DEFAULT_H,
          title: `Note ${S.notes.size + 1}`,
          content: '',
          color: color || S.selectedColor,
          font: S.defaultFont,
          locked: false,
        };
      }

      function createNoteFromData(data) {
        return {
          ...data,
          el: null,
          titleEl: null,
          bodyEl: null,
          hdrEl: null,
          lockBtn: null,
          deleteBtn: null,
          rszEl: null,
        };
      }

      function addNote(x, y) {
        if (x === undefined) {
          const rect = dom.canvasWrap.getBoundingClientRect();
          x = (rect.width / 2 - S.panX) / S.scale - CFG.NOTE_DEFAULT_W/2;
          y = (rect.height / 2 - S.panY) / S.scale - CFG.NOTE_DEFAULT_H/2;
        }
        pushHistory();
        const data = createNoteData(x, y);
        const note = createNoteFromData(data);
        S.notes.set(note.id, note);
        renderNote(note, true);
        updateCount();
        updateMinimap();
        scheduleAutoSave();
        // Auto-select and focus title
        setTimeout(() => {
          selectNote(note.id);
          note.titleEl?.focus();
        }, 50);
        return note.id;
      }

      function renderNote(note, animate) {
        const el = document.createElement('div');
        el.className = 'note' + (animate ? ' entering' : '');
        if (note.locked) el.classList.add('locked');
        el.id = note.id;
        el.style.left = note.x + 'px';
        el.style.top = note.y + 'px';
        el.style.width = note.w + 'px';
        el.style.minHeight = note.h + 'px';
        el.style.setProperty('--box-accent', note.color);
        el.style.fontFamily = note.font;

        el.innerHTML = `
          <div class="note-hdr">
            <div class="note-color-dot"></div>
            <input class="note-title" type="text" value="${escapeHtml(note.title)}" placeholder="Title…" spellcheck="false" />
            <div class="note-actions">
              <button class="note-action-btn lock-btn" title="${note.locked ? 'Unlock' : 'Lock'}">
                ${note.locked ? lockIcon() : unlockIcon()}
              </button>
              <button class="note-action-btn delete-btn" title="Delete">
                ${trashIcon()}
              </button>
            </div>
          </div>
          <div class="note-body" contenteditable="${note.locked ? 'false' : 'true'}" data-placeholder="Start typing…" spellcheck="false">${note.content}</div>
          <div class="note-rsz" title="Resize">
            <svg viewBox="0 0 10 10"><path d="M2 10 L10 2 M6 10 L10 6"/></svg>
          </div>
        `;

        note.el = el;
        note.hdrEl = el.querySelector('.note-hdr');
        note.titleEl = el.querySelector('.note-title');
        note.bodyEl = el.querySelector('.note-body');
        note.lockBtn = el.querySelector('.lock-btn');
        note.deleteBtn = el.querySelector('.delete-btn');
        note.rszEl = el.querySelector('.note-rsz');

        // Wire events
        wireNoteEvents(note);
        dom.world.appendChild(el);
      }

      function wireNoteEvents(note) {
        const { id, el, hdrEl, titleEl, bodyEl, lockBtn, deleteBtn, rszEl } = note;

        // Header drag
        hdrEl.addEventListener('mousedown', (e) => {
          if (e.target === titleEl) return;
          e.preventDefault();
          if (note.locked) return;
          startDrag(id, e.clientX, e.clientY);
        });
        hdrEl.addEventListener('touchstart', (e) => {
          if (e.target === titleEl) return;
          e.preventDefault();
          const t = e.touches[0];
          if (note.locked) return;
          startDrag(id, t.clientX, t.clientY);
        }, { passive: false });

        // Click to select (but not on buttons)
        el.addEventListener('mousedown', (e) => {
          if (e.target.closest('.note-action-btn') || e.target.closest('.note-rsz')) return;
          if (S.mode === 'pan') {
            if (e.ctrlKey || e.metaKey) {
              toggleSelectNote(id);
            } else {
              if (!S.selectedIds.has(id)) {
                clearSelection();
                addToSelection(id);
              }
            }
          }
          e.stopPropagation();
        });

        // Touch to select (but not on buttons)
        el.addEventListener('touchstart', (e) => {
          if (e.target.closest('.note-action-btn') || e.target.closest('.note-rsz')) return;
          e.preventDefault();
          if (S.mode === 'pan') {
            // For touch, we don't support multi-select with modifiers
            if (!S.selectedIds.has(id)) {
              clearSelection();
              addToSelection(id);
            }
          }
          e.stopPropagation();
        }, { passive: false });

        // Title input
        titleEl.addEventListener('input', () => {
          note.title = titleEl.value;
          scheduleAutoSave();
          updateMinimap();
        });
        titleEl.addEventListener('change', () => pushHistory());

        // Body editing
        bodyEl.addEventListener('focus', () => {
          if (note.locked) return;
          S.activeNoteId = id;
          showFormatBar();
          syncFormatBar();
          note.el.classList.add('focused');
        });
        bodyEl.addEventListener('blur', () => {
          note.content = sanitize(bodyEl.innerHTML);
          pushHistory();
          scheduleAutoSave();
          setTimeout(() => {
            if (!dom.formatBar.contains(document.activeElement)) {
              S.activeNoteId = null;
              hideFormatBar();
              note.el.classList.remove('focused');
            }
          }, 120);
        });
        bodyEl.addEventListener('input', () => {
          note.content = bodyEl.innerHTML;
          scheduleAutoSave();
          updateMinimap();
        });
        bodyEl.addEventListener('keyup', () => syncFormatBar());
        bodyEl.addEventListener('mouseup', () => syncFormatBar());

        // Lock
        lockBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleLock(id);
        });
        lockBtn.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
        lockBtn.addEventListener('touchend', (e) => {
          e.stopPropagation();
          toggleLock(id);
        }, { passive: false });

        // Delete
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (note.locked) return;
          deleteNote(id);
        });
        deleteBtn.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
        deleteBtn.addEventListener('touchend', (e) => {
          e.stopPropagation();
          if (note.locked) return;
          deleteNote(id);
        }, { passive: false });

        // Resize
        rszEl.addEventListener('mousedown', (e) => {
          e.preventDefault(); e.stopPropagation();
          if (note.locked) return;
          startResize(id, e.clientX, e.clientY);
        });
        rszEl.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const t = e.touches[0];
          if (note.locked) return;
          startResize(id, t.clientX, t.clientY);
        }, { passive: false });
      }

      // ---------- SELECTION ----------
      function clearSelection() {
        S.selectedIds.forEach(id => {
          const n = S.notes.get(id);
          if (n && n.el) n.el.classList.remove('selected');
        });
        S.selectedIds.clear();
      }

      function addToSelection(id) {
        S.selectedIds.add(id);
        const n = S.notes.get(id);
        if (n && n.el) n.el.classList.add('selected');
      }

      function removeFromSelection(id) {
        S.selectedIds.delete(id);
        const n = S.notes.get(id);
        if (n && n.el) n.el.classList.remove('selected');
      }

      function toggleSelectNote(id) {
        if (S.selectedIds.has(id)) removeFromSelection(id);
        else addToSelection(id);
      }

      function selectNote(id) {
        clearSelection();
        addToSelection(id);
      }

      // ---------- DRAG (single or group) ----------
      function startDrag(id, clientX, clientY) {
        if (S.mode !== 'pan') return;
        // If this note is selected and there are multiple, start group drag
        if (S.selectedIds.has(id) && S.selectedIds.size > 1) {
          startGroupDrag(clientX, clientY);
          return;
        }
        S.dragging = true;
        S.dragId = id;
        const world = clientToWorld(clientX, clientY);
        const note = S.notes.get(id);
        S.dragOffX = world.x - note.x;
        S.dragOffY = world.y - note.y;
        S.dragStartX = note.x;
        S.dragStartY = note.y;
        note.el.classList.add('is-dragging');
        note.hdrEl.classList.add('grabbing');
      }

      function onDragMove(clientX, clientY) {
        if (!S.dragging) return;
        const world = clientToWorld(clientX, clientY);
        const note = S.notes.get(S.dragId);
        if (!note) return;
        note.x = world.x - S.dragOffX;
        note.y = world.y - S.dragOffY;
        note.el.style.left = note.x + 'px';
        note.el.style.top = note.y + 'px';
        if (S.activeNoteId === note.id) repositionFormatBar();
        updateMinimap();
      }

      function endDrag() {
        if (!S.dragging) return;
        const note = S.notes.get(S.dragId);
        if (note) {
          note.el.classList.remove('is-dragging');
          note.hdrEl.classList.remove('grabbing');
          pushHistory();
        }
        S.dragging = false;
        S.dragId = null;
      }

      // ---------- GROUP DRAG ----------
      function startGroupDrag(clientX, clientY) {
        S.groupDragActive = true;
        const world = clientToWorld(clientX, clientY);
        S.groupDragStart = { x: world.x, y: world.y };
        S.groupDragOffsets.clear();
        S.selectedIds.forEach(id => {
          const note = S.notes.get(id);
          if (note) {
            S.groupDragOffsets.set(id, { dx: note.x - world.x, dy: note.y - world.y });
          }
        });
      }

      function onGroupDragMove(clientX, clientY) {
        if (!S.groupDragActive) return;
        const world = clientToWorld(clientX, clientY);
        const dx = world.x - S.groupDragStart.x;
        const dy = world.y - S.groupDragStart.y;
        S.groupDragOffsets.forEach((offs, id) => {
          const note = S.notes.get(id);
          if (note) {
            note.x = S.groupDragStart.x + offs.dx + dx;
            note.y = S.groupDragStart.y + offs.dy + dy;
            note.el.style.left = note.x + 'px';
            note.el.style.top = note.y + 'px';
          }
        });
        updateMinimap();
      }

      function endGroupDrag() {
        if (!S.groupDragActive) return;
        pushHistory();
        S.groupDragActive = false;
        S.groupDragOffsets.clear();
      }

      // ---------- RESIZE ----------
      function startResize(id, clientX, clientY) {
        if (S.mode !== 'pan') return;
        S.resizing = true;
        S.resizeId = id;
        const note = S.notes.get(id);
        S.resizeStartW = note.w;
        S.resizeStartH = note.h;
        S.resizeStartX = clientX;
        S.resizeStartY = clientY;
      }

      function onResizeMove(clientX, clientY) {
        if (!S.resizing) return;
        const note = S.notes.get(S.resizeId);
        if (!note) return;
        const dw = (clientX - S.resizeStartX) / S.scale;
        const dh = (clientY - S.resizeStartY) / S.scale;
        note.w = Math.max(CFG.NOTE_MIN_W, S.resizeStartW + dw);
        note.h = Math.max(CFG.NOTE_MIN_H, S.resizeStartH + dh);
        note.el.style.width = note.w + 'px';
        note.el.style.minHeight = note.h + 'px';
        if (S.activeNoteId === note.id) repositionFormatBar();
        updateMinimap();
      }

      function endResize() {
        if (!S.resizing) return;
        pushHistory();
        S.resizing = false;
        S.resizeId = null;
      }

      // ---------- LOCK / DELETE ----------
      function toggleLock(id) {
        const note = S.notes.get(id);
        note.locked = !note.locked;
        note.el.classList.toggle('locked', note.locked);
        note.lockBtn.innerHTML = note.locked ? lockIcon() : unlockIcon();
        note.lockBtn.title = note.locked ? 'Unlock' : 'Lock';
        note.bodyEl.contentEditable = note.locked ? 'false' : 'true';
        pushHistory();
        scheduleAutoSave();
      }

      function deleteNote(id) {
        pushHistory();
        const note = S.notes.get(id);
        if (!note) return;
        // Store backup for undo
        S.deletedNoteBackup = {
          id, x: note.x, y: note.y, w: note.w, h: note.h,
          title: note.title, content: note.content, color: note.color, font: note.font, locked: note.locked
        };
        note.el.classList.add('box-delete');
        setTimeout(() => note.el.remove(), 180);
        S.notes.delete(id);
        if (S.selectedIds.has(id)) removeFromSelection(id);
        if (S.activeNoteId === id) { S.activeNoteId = null; hideFormatBar(); }
        updateCount();
        updateMinimap();
        scheduleAutoSave();
        showToast('Note deleted', { action: { label: 'Undo', fn: undoDelete } });
      }

      function undoDelete() {
        if (!S.deletedNoteBackup) return;
        const data = S.deletedNoteBackup;
        const note = createNoteFromData(data);
        S.notes.set(note.id, note);
        renderNote(note, true);
        updateCount();
        updateMinimap();
        pushHistory();
        showToast('Note restored');
        S.deletedNoteBackup = null;
      }

      // ---------- LASSO ----------
      function startLasso(worldX, worldY) {
        S.lassoActive = true;
        S.lassoStart = { x: worldX, y: worldY };
        S.lassoEnd = { x: worldX, y: worldY };
        dom.selectionRect.style.display = 'block';
        updateLassoRect();
      }

      function updateLasso(worldX, worldY) {
        if (!S.lassoActive) return;
        S.lassoEnd = { x: worldX, y: worldY };
        updateLassoRect();
      }

      function updateLassoRect() {
        const left = Math.min(S.lassoStart.x, S.lassoEnd.x);
        const top = Math.min(S.lassoStart.y, S.lassoEnd.y);
        const right = Math.max(S.lassoStart.x, S.lassoEnd.x);
        const bottom = Math.max(S.lassoStart.y, S.lassoEnd.y);
        const p1 = worldToScreen(left, top);
        const p2 = worldToScreen(right, bottom);
        dom.selectionRect.style.left = p1.x + 'px';
        dom.selectionRect.style.top = p1.y + 'px';
        dom.selectionRect.style.width = (p2.x - p1.x) + 'px';
        dom.selectionRect.style.height = (p2.y - p1.y) + 'px';
      }

      function endLasso() {
        if (!S.lassoActive) return;
        S.lassoActive = false;
        dom.selectionRect.style.display = 'none';
        const lassoLeft = Math.min(S.lassoStart.x, S.lassoEnd.x);
        const lassoTop = Math.min(S.lassoStart.y, S.lassoEnd.y);
        const lassoRight = Math.max(S.lassoStart.x, S.lassoEnd.x);
        const lassoBottom = Math.max(S.lassoStart.y, S.lassoEnd.y);
        // If lasso is tiny, ignore
        if (Math.abs(lassoRight - lassoLeft) < 5 || Math.abs(lassoBottom - lassoTop) < 5) return;
        // Select notes intersecting lasso
        clearSelection();
        S.notes.forEach((note, id) => {
          const noteLeft = note.x;
          const noteRight = note.x + note.w;
          const noteTop = note.y;
          const noteBottom = note.y + note.h;
          if (noteRight > lassoLeft && noteLeft < lassoRight && noteBottom > lassoTop && noteTop < lassoBottom) {
            addToSelection(id);
          }
        });
      }

      // ---------- CANVAS TRANSFORM ----------
      function applyTransform() {
        dom.world.style.transform = `translate(${S.panX}px, ${S.panY}px) scale(${S.scale})`;
        dom.zoomLabel.textContent = Math.round(S.scale * 100) + '%';
        // Update grid position
        const gs = CFG.GRID_BASE * S.scale;
        const gx = ((S.panX % gs) + gs) % gs;
        const gy = ((S.panY % gs) + gs) % gs;
        dom.canvasWrap.style.setProperty('--grid-size', gs + 'px');
        dom.canvasWrap.style.setProperty('--grid-x', gx + 'px');
        dom.canvasWrap.style.setProperty('--grid-y', gy + 'px');
        updateMinimap();
      }

      function clientToWorld(cx, cy) {
        const rect = dom.canvasWrap.getBoundingClientRect();
        return {
          x: (cx - rect.left - S.panX) / S.scale,
          y: (cy - rect.top - S.panY) / S.scale,
        };
      }

      function worldToScreen(wx, wy) {
        return {
          x: wx * S.scale + S.panX,
          y: wy * S.scale + S.panY,
        };
      }

      function zoomAt(factor, cx, cy) {
        const rect = dom.canvasWrap.getBoundingClientRect();
        const ox = (cx !== undefined ? cx : rect.width/2) - rect.left;
        const oy = (cy !== undefined ? cy : rect.height/2) - rect.top;
        const newScale = clamp(S.scale * factor, CFG.MIN_SCALE, CFG.MAX_SCALE);
        const ratio = newScale / S.scale;
        S.panX = ox - (ox - S.panX) * ratio;
        S.panY = oy - (oy - S.panY) * ratio;
        S.scale = newScale;
        applyTransform();
      }

      function zoomTo(targetScale, cx, cy) {
        const rect = dom.canvasWrap.getBoundingClientRect();
        const ox = (cx !== undefined ? cx : rect.width/2) - rect.left;
        const oy = (cy !== undefined ? cy : rect.height/2) - rect.top;
        const clampedScale = clamp(targetScale, CFG.MIN_SCALE, CFG.MAX_SCALE);
        const ratio = clampedScale / S.scale;
        S.panX = ox - (ox - S.panX) * ratio;
        S.panY = oy - (oy - S.panY) * ratio;
        S.scale = clampedScale;
        applyTransform();
      }

      function zoomIn() { zoomAt(1.2); }
      function zoomOut() { zoomAt(1/1.2); }
      function resetView() { S.scale = 1; S.panX = 0; S.panY = 0; applyTransform(); }

      function fitToScreen() {
        const notes = Array.from(S.notes.values());
        if (notes.length === 0) { resetView(); return; }
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        notes.forEach(n => {
          minX = Math.min(minX, n.x);
          minY = Math.min(minY, n.y);
          maxX = Math.max(maxX, n.x + n.w);
          maxY = Math.max(maxY, n.y + n.h);
        });
        const pad = 80;
        const bw = maxX - minX + pad*2;
        const bh = maxY - minY + pad*2;
        const rect = dom.canvasWrap.getBoundingClientRect();
        const scaleX = rect.width / bw;
        const scaleY = rect.height / bh;
        S.scale = clamp(Math.min(scaleX, scaleY, 1.5), CFG.MIN_SCALE, CFG.MAX_SCALE);
        S.panX = rect.width/2 - (minX - pad + bw/2) * S.scale;
        S.panY = rect.height/2 - (minY - pad + bh/2) * S.scale;
        applyTransform();
      }

      // ---------- PAN ----------
      function startPan(clientX, clientY) {
        S.panning = true;
        S.panStartX = clientX;
        S.panStartY = clientY;
        S.panStartPanX = S.panX;
        S.panStartPanY = S.panY;
        dom.canvasWrap.classList.add('panning');
      }

      function onPanMove(clientX, clientY) {
        if (!S.panning) return;
        S.panX = S.panStartPanX + (clientX - S.panStartX);
        S.panY = S.panStartPanY + (clientY - S.panStartY);
        applyTransform();
      }

      function endPan() {
        if (!S.panning) return;
        S.panning = false;
        dom.canvasWrap.classList.remove('panning');
      }

      // ---------- MODE ----------
      function setMode(mode) {
        S.mode = mode;
        dom.modePan.classList.toggle('active', mode === 'pan');
        dom.modeCreate.classList.toggle('active', mode === 'create');
        dom.hamburgerModePan.classList.toggle('active', mode === 'pan');
        dom.hamburgerModeCreate.classList.toggle('active', mode === 'create');
        dom.canvasWrap.className = 'mode-' + mode + (S.panning ? ' panning' : '');
        dom.statusMode.textContent = mode === 'pan' ? 'Pan mode' : 'Create mode';
      }

      // ---------- FORMAT BAR ----------
      function showFormatBar() { dom.formatBar.classList.add('visible'); repositionFormatBar(); }
      function hideFormatBar() { dom.formatBar.classList.remove('visible'); }

      function repositionFormatBar() {
        if (!S.activeNoteId) return;
        const note = S.notes.get(S.activeNoteId);
        if (!note || !note.el) return;
        const rect = note.el.getBoundingClientRect();
        const fw = dom.formatBar.offsetWidth || 500;
        const fh = dom.formatBar.offsetHeight || 44;
        const mg = 8;
        let top = rect.top - fh - mg;
        if (top < 70) top = rect.bottom + mg;
        let left = rect.left;
        if (left + fw > window.innerWidth - mg) left = window.innerWidth - fw - mg;
        if (left < mg) left = mg;
        dom.formatBar.style.top = top + 'px';
        dom.formatBar.style.left = left + 'px';
      }

      function syncFormatBar() {
        // Query command states
        ['bold','italic','underline','strikethrough'].forEach(cmd => {
          const btn = dom.formatBar.querySelector(`[data-cmd="${cmd}"]`);
          if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
        });
        // Font family & size from selection
        const sel = window.getSelection();
        if (!sel.rangeCount) return;
        let node = sel.getRangeAt(0).startContainer;
        if (node.nodeType === 3) node = node.parentElement;
        if (!node || !node.closest('.note-body')) return;
        const cs = window.getComputedStyle(node);
        // Font size
        const szPx = node.style.fontSize || cs.fontSize;
        if (szPx) {
          const num = Math.round(parseFloat(szPx));
          const opt = Array.from(dom.fmtFontSize.options).find(o => parseInt(o.value) === num);
          if (opt) dom.fmtFontSize.value = opt.value;
        }
        // Font family
        const ff = node.style.fontFamily || cs.fontFamily;
        if (ff) {
          const first = ff.split(',')[0].trim().replace(/['"]/g,'');
          const opt = Array.from(dom.fmtFontFamily.options).find(o => o.value.split(',')[0].trim().replace(/['"]/g,'') === first);
          dom.fmtFontFamily.selectedIndex = opt ? opt.index : 0;
        }
        // Text color
        try { dom.fmtTextColor.value = rgbToHex(cs.color); } catch(e) {}
      }

      function execFormat(cmd) {
        if (!S.activeNoteId) return;
        const note = S.notes.get(S.activeNoteId);
        if (!note) return;
        note.bodyEl.focus();
        document.execCommand('styleWithCSS', false, true);
        document.execCommand(cmd, false, null);
        syncFormatBar();
        note.content = note.bodyEl.innerHTML;
        scheduleAutoSave();
      }

      function applyFontFamily(family) {
        if (!S.activeNoteId || !family) return;
        const note = S.notes.get(S.activeNoteId);
        if (!note) return;
        note.bodyEl.focus();
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('fontName', false, family);
        note.content = note.bodyEl.innerHTML;
        scheduleAutoSave();
      }

      function applyFontSize(px) {
        if (!S.activeNoteId) return;
        const note = S.notes.get(S.activeNoteId);
        if (!note) return;
        note.bodyEl.focus();
        document.execCommand('styleWithCSS', false, false);
        document.execCommand('fontSize', false, '7');
        // Replace <font size="7"> with <span style="font-size:...">
        note.bodyEl.querySelectorAll('font[size="7"]').forEach(f => {
          const span = document.createElement('span');
          span.style.fontSize = px + 'px';
          while (f.firstChild) span.appendChild(f.firstChild);
          f.parentNode.replaceChild(span, f);
        });
        note.content = note.bodyEl.innerHTML;
        scheduleAutoSave();
      }

      function applyTextColor(hex) {
        if (!S.activeNoteId) return;
        const note = S.notes.get(S.activeNoteId);
        if (!note) return;
        note.bodyEl.focus();
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('foreColor', false, hex);
        note.content = note.bodyEl.innerHTML;
        scheduleAutoSave();
      }

      // ---------- SEARCH ----------
      let searchMatches = [];
      let searchCursor = -1;
      let searchOpen = false;

      function toggleSearch() {
        searchOpen = !searchOpen;
        dom.searchPanel.classList.toggle('open', searchOpen);
        dom.searchBtn.classList.toggle('active', searchOpen);
        if (searchOpen) {
          dom.spInput.focus();
          runSearch();
        } else {
          clearSearchHighlights();
        }
      }

      function closeSearch() {
        searchOpen = false;
        dom.searchPanel.classList.remove('open');
        dom.searchBtn.classList.remove('active');
        clearSearchHighlights();
      }

      function runSearch() {
        const q = dom.spInput.value.trim().toLowerCase();
        clearSearchHighlights();
        if (!q) {
          searchMatches = [];
          searchCursor = -1;
          dom.spMeta.textContent = '';
          return;
        }
        searchMatches = [];
        S.notes.forEach((note, id) => {
          const text = note.bodyEl ? note.bodyEl.textContent : '';
          if (text.toLowerCase().includes(q)) searchMatches.push(id);
        });
        if (searchMatches.length === 0) {
          searchCursor = -1;
          dom.spMeta.textContent = 'No results';
        } else {
          if (searchCursor < 0 || searchCursor >= searchMatches.length) searchCursor = 0;
          highlightSearch();
        }
      }

      function highlightSearch() {
        clearSearchHighlights();
        if (searchMatches.length === 0) return;
        searchCursor = (searchCursor + searchMatches.length) % searchMatches.length;
        dom.spMeta.textContent = `${searchCursor+1} of ${searchMatches.length} match${searchMatches.length!==1?'es':''}`;
        const id = searchMatches[searchCursor];
        const note = S.notes.get(id);
        if (note && note.el) {
          note.el.classList.add('is-searching-match');
          // Center view on note
          const rect = dom.canvasWrap.getBoundingClientRect();
          S.panX = rect.width/2 - (note.x + note.w/2) * S.scale;
          S.panY = rect.height/2 - (note.y + note.h/2) * S.scale;
          applyTransform();
        }
      }

      function clearSearchHighlights() {
        S.notes.forEach(n => n.el && n.el.classList.remove('is-searching-match'));
        dom.spInput.value = '';
        dom.spMeta.textContent = '';
      }

      // ---------- TOOLBOX TOGGLE ----------
      let toolboxHidden = false;
      let mobileToolboxOpen = false;

      function toggleToolbox() {
        if (window.innerWidth <= 680) {
          // Mobile: toggle bottom sheet
          mobileToolboxOpen = !mobileToolboxOpen;
          dom.mobileToolbox.classList.toggle('open', mobileToolboxOpen);
          dom.toolboxBtn.classList.toggle('active', mobileToolboxOpen);
        } else {
          // Desktop: toggle sidebar
          toolboxHidden = !toolboxHidden;
          dom.toolbox.classList.toggle('hidden', toolboxHidden);
          dom.toolboxBtn.classList.toggle('active', !toolboxHidden);
        }
      }

      // ---------- MINI MAP ----------
      let minimapTimer = null;
      function scheduleMinimapUpdate() {
        if (minimapTimer) return;
        minimapTimer = requestAnimationFrame(() => { minimapTimer = null; updateMinimap(); });
      }

      function updateMinimap() {
        const mc = dom.minimapCanvas;
        const mw = mc.offsetWidth;
        const mh = mc.offsetHeight;
        // Remove old dots
        mc.querySelectorAll('.minimap-dot').forEach(d => d.remove());

        const notes = Array.from(S.notes.values());
        if (notes.length === 0) {
          dom.minimapViewport.style.display = 'none';
          return;
        }

        // World bounds
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        notes.forEach(n => {
          minX = Math.min(minX, n.x);
          minY = Math.min(minY, n.y);
          maxX = Math.max(maxX, n.x + n.w);
          maxY = Math.max(maxY, n.y + n.h);
        });
        const pad = 60;
        minX -= pad; minY -= pad; maxX += pad; maxY += pad;
        const worldW = maxX - minX;
        const worldH = maxY - minY;
        if (worldW <= 0 || worldH <= 0) return;

        const scaleX = mw / worldW;
        const scaleY = mh / worldH;
        const sc = Math.min(scaleX, scaleY);

        // Dots
        notes.forEach(n => {
          const dot = document.createElement('div');
          dot.className = 'minimap-dot';
          const cx = (n.x - minX + n.w/2) * sc;
          const cy = (n.y - minY + n.h/2) * sc;
          const dotW = Math.max(6, n.w * sc);
          const dotH = Math.max(6, n.h * sc);
          dot.style.left = cx + 'px';
          dot.style.top = cy + 'px';
          dot.style.width = dotW + 'px';
          dot.style.height = dotH + 'px';
          dot.style.background = n.color;
          dot.title = n.title;
          dot.addEventListener('click', (e) => {
            e.stopPropagation();
            navigateToNote(n.id);
          });
          dot.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
          dot.addEventListener('touchend', (e) => {
            e.stopPropagation();
            navigateToNote(n.id);
          }, { passive: false });
          mc.appendChild(dot);
        });

        // Viewport rect
        const canvasRect = dom.canvasWrap.getBoundingClientRect();
        const vpLeft = (-S.panX / S.scale - minX) * sc;
        const vpTop = (-S.panY / S.scale - minY) * sc;
        const vpW = (canvasRect.width / S.scale) * sc;
        const vpH = (canvasRect.height / S.scale) * sc;
        const vp = dom.minimapViewport;
        vp.style.display = 'block';
        vp.style.left = vpLeft + 'px';
        vp.style.top = vpTop + 'px';
        vp.style.width = vpW + 'px';
        vp.style.height = vpH + 'px';
      }

      function navigateToNote(id) {
        const note = S.notes.get(id);
        if (!note) return;
        const rect = dom.canvasWrap.getBoundingClientRect();
        S.panX = rect.width/2 - (note.x + note.w/2) * S.scale;
        S.panY = rect.height/2 - (note.y + note.h/2) * S.scale;
        applyTransform();
        selectNote(id);
        note.el.classList.add('highlight-flash');
        setTimeout(() => note.el.classList.remove('highlight-flash'), 900);
      }

      // ---------- AUTO-SAVE ----------
      function scheduleAutoSave() {
        clearTimeout(S.saveTimer);
        dom.saveDot.className = 'saving';
        S.saveTimer = setTimeout(() => saveToStorage(), CFG.SAVE_DELAY);
      }

      function saveToStorage() {
        const data = {
          version: 1,
          theme: S.theme,
          panX: S.panX, panY: S.panY, scale: S.scale,
          notes: [],
        };
        S.notes.forEach(n => {
          data.notes.push({
            id: n.id, x: n.x, y: n.y, w: n.w, h: n.h,
            title: n.title, content: sanitize(n.content), color: n.color, font: n.font, locked: n.locked,
          });
        });
        try {
          localStorage.setItem(CFG.STORE_KEY, JSON.stringify(data));
          dom.saveDot.className = 'saved';
          setTimeout(() => { dom.saveDot.className = ''; }, 1600);
        } catch (e) {
          dom.saveDot.className = '';
          showToast('Auto-save failed', { warn: true });
        }
      }

      function loadFromStorage() {
        const raw = localStorage.getItem(CFG.STORE_KEY);
        if (!raw) return;
        try {
          const data = JSON.parse(raw);
          if (data.theme) setTheme(data.theme);
          if (typeof data.panX === 'number') S.panX = data.panX;
          if (typeof data.panY === 'number') S.panY = data.panY;
          if (typeof data.scale === 'number') S.scale = clamp(data.scale, CFG.MIN_SCALE, CFG.MAX_SCALE);
          if (Array.isArray(data.notes)) {
            data.notes.forEach(n => {
              const note = createNoteFromData(n);
              S.notes.set(note.id, note);
              renderNote(note, false);
            });
            // Update nextId
            const maxId = Math.max(...data.notes.map(n => parseInt(n.id.split('_')[1] || '0')).filter(v => !isNaN(v)), 0);
            S.nextId = maxId + 1;
          }
        } catch (e) { console.warn('Failed to load', e); }
      }

      // ---------- EXPORT / IMPORT ----------
      function exportBoard() {
        const data = {
          version: 1,
          exported: new Date().toISOString(),
          panX: S.panX, panY: S.panY, scale: S.scale,
          notes: [],
        };
        S.notes.forEach(n => {
          data.notes.push({
            id: n.id, x: n.x, y: n.y, w: n.w, h: n.h,
            title: n.title, content: sanitize(n.content), color: n.color, font: n.font, locked: n.locked,
          });
        });
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'canvas_' + Date.now() + '.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Board exported');
      }

      function importBoard(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (!Array.isArray(data.notes)) throw new Error('Invalid');
            // Clear current
            S.notes.forEach(n => n.el.remove());
            S.notes.clear();
            S.selectedIds.clear();
            S.activeNoteId = null;
            hideFormatBar();
            // Restore view
            if (data.panX) S.panX = data.panX;
            if (data.panY) S.panY = data.panY;
            if (data.scale) S.scale = clamp(data.scale, CFG.MIN_SCALE, CFG.MAX_SCALE);
            data.notes.forEach(n => {
              const note = createNoteFromData(n);
              S.notes.set(note.id, note);
              renderNote(note, false);
            });
            const maxId = Math.max(...data.notes.map(n => parseInt(n.id.split('_')[1] || '0')).filter(v => !isNaN(v)), 0);
            S.nextId = maxId + 1;
            applyTransform();
            updateCount();
            updateMinimap();
            pushHistory();
            scheduleAutoSave();
            showToast(`Imported ${data.notes.length} notes`);
          } catch (err) {
            showToast('Invalid file', { warn: true });
          }
        };
        reader.readAsText(file);
      }

      // ---------- TOAST ----------
      function showToast(msg, opts = {}) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        if (opts.success) toast.classList.add('success');
        if (opts.warn) toast.classList.add('warn');
        toast.innerHTML = `<span>${msg}</span>`;
        if (opts.action) {
          const btn = document.createElement('button');
          btn.className = 'toast-action';
          btn.textContent = opts.action.label;
          btn.onclick = () => { opts.action.fn(); hideToast(toast); };
          toast.appendChild(btn);
        }
        dom.toastContainer.appendChild(toast);
        setTimeout(() => hideToast(toast), opts.dur || 2800);
      }

      function hideToast(toast) {
        toast.classList.add('out');
        setTimeout(() => toast.remove(), 220);
      }

      // ---------- THEME ----------
      function setTheme(t) {
        S.theme = t;
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('fusion_theme', t);
      }

      function toggleTheme() {
        setTheme(S.theme === 'dark' ? 'light' : 'dark');
      }

      // ---------- UI UPDATES ----------
      function updateCount() {
        const c = S.notes.size;
        dom.statusCount.textContent = c + ' note' + (c !== 1 ? 's' : '');
        dom.boxCount.textContent = c + ' note' + (c !== 1 ? 's' : '');
      }

      // ---------- ICONS ----------
      function lockIcon() {
        return `<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
      }
      function unlockIcon() {
        return `<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>`;
      }
      function trashIcon() {
        return `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
      }
      function escapeHtml(unsafe) {
        return String(unsafe).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      // ---------- EVENT LISTENERS ----------
      // Canvas mouse events
      dom.canvasWrap.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        const target = e.target;
        if (target === dom.canvasWrap || target === dom.viewport || target === dom.world) {
          // Click on empty canvas
          if (S.mode === 'create') {
            if (e.ctrlKey || e.metaKey) {
              const world = clientToWorld(e.clientX, e.clientY);
              startLasso(world.x, world.y);
            } else {
              const world = clientToWorld(e.clientX, e.clientY);
              addNote(world.x - CFG.NOTE_DEFAULT_W/2, world.y - CFG.NOTE_DEFAULT_H/2);
            }
          } else { // pan mode
            if (e.ctrlKey || e.metaKey) {
              const world = clientToWorld(e.clientX, e.clientY);
              startLasso(world.x, world.y);
            } else {
              clearSelection();
              startPan(e.clientX, e.clientY);
            }
          }
        } else if (S.mode === 'pan' && !e.ctrlKey && !e.metaKey) {
          // If clicking on a note, selection is handled in note mousedown
          // But if clicking on non-note, start pan
          if (!e.target.closest('.note')) {
            startPan(e.clientX, e.clientY);
          }
        }
      });

      document.addEventListener('mousemove', (e) => {
        const x = e.clientX, y = e.clientY;
        if (S.panning) onPanMove(x, y);
        else if (S.groupDragActive) onGroupDragMove(x, y);
        else if (S.dragging) onDragMove(x, y);
        else if (S.resizing) onResizeMove(x, y);
        else if (S.lassoActive) {
          const world = clientToWorld(x, y);
          updateLasso(world.x, world.y);
        }
      });

      document.addEventListener('mouseup', () => {
        if (S.lassoActive) endLasso();
        if (S.groupDragActive) endGroupDrag();
        endDrag();
        endResize();
        endPan();
      });

      // Touch events with pinch-to-zoom
      let initialPinchDistance = 0;
      let initialScale = 1;
      let touchStartX = 0;
      let touchStartY = 0;
      let isDragging = false;
      let isPanning = false;

      dom.canvasWrap.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;

        // Check if touch is on empty canvas (not on a note)
        const target = e.target;
        const isOnEmptyCanvas = target === dom.canvasWrap || target === dom.viewport || target === dom.world;

        if (e.touches.length === 1) {
          if (isOnEmptyCanvas) {
            // Touch on empty canvas
            if (S.mode === 'create') {
              e.preventDefault();
              const world = clientToWorld(touch.clientX, touch.clientY);
              addNote(world.x - CFG.NOTE_DEFAULT_W/2, world.y - CFG.NOTE_DEFAULT_H/2);
              return;
            }
          }
          // Single touch - prepare for potential pan or selection
          isDragging = false;
          isPanning = false;
        } else if (e.touches.length === 2) {
          // Start pinch
          e.preventDefault();
          const t1 = e.touches[0];
          const t2 = e.touches[1];
          initialPinchDistance = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
          initialScale = S.scale;
          const centerX = (t1.clientX + t2.clientX) / 2;
          const centerY = (t1.clientY + t2.clientY) / 2;
          S.pinchCenterX = centerX;
          S.pinchCenterY = centerY;
        }
      }, { passive: false });

      dom.canvasWrap.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1) {
          const touch = e.touches[0];
          const deltaX = touch.clientX - touchStartX;
          const deltaY = touch.clientY - touchStartY;

          // If moved more than 10px, start panning
          if (Math.abs(deltaX) > 10 || Math.abs(deltaY) > 10) {
            if (!isPanning && !isDragging) {
              isPanning = true;
              startPan(touchStartX, touchStartY);
            }
            if (isPanning) {
              onPanMove(touch.clientX, touch.clientY);
            }
          }
        } else if (e.touches.length === 2) {
          // Handle pinch
          e.preventDefault();
          const t1 = e.touches[0];
          const t2 = e.touches[1];
          const currentDistance = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
          const scale = initialScale * (currentDistance / initialPinchDistance);
          const clampedScale = Math.max(CFG.MIN_SCALE, Math.min(CFG.MAX_SCALE, scale));
          zoomTo(clampedScale, S.pinchCenterX, S.pinchCenterY);
        }
      }, { passive: false });

      dom.canvasWrap.addEventListener('touchend', (e) => {
        if (isPanning) {
          endPan();
        }
        isDragging = false;
        isPanning = false;
      }, { passive: false });

      // Wheel zoom
      dom.canvasWrap.addEventListener('wheel', (e) => {
        e.preventDefault();
        zoomAt(e.deltaY < 0 ? 1.1 : 0.9, e.clientX, e.clientY);
      }, { passive: false });

      // Context menu prevention
      dom.canvasWrap.addEventListener('contextmenu', e => e.preventDefault());

      // Toolbar buttons
      dom.undoBtn.addEventListener('click', undo);
      dom.redoBtn.addEventListener('click', redo);
      dom.zoomInBtn.addEventListener('click', zoomIn);
      dom.zoomOutBtn.addEventListener('click', zoomOut);
      dom.fitBtn.addEventListener('click', fitToScreen);
      dom.resetBtn.addEventListener('click', resetView);
      dom.modePan.addEventListener('click', () => setMode('pan'));
      dom.modeCreate.addEventListener('click', () => setMode('create'));
      dom.toolboxBtn.addEventListener('click', toggleToolbox);
      dom.mobileToolboxClose.addEventListener('click', () => {
        mobileToolboxOpen = false;
        dom.mobileToolbox.classList.remove('open');
        dom.toolboxBtn.classList.remove('active');
      });
      dom.searchBtn.addEventListener('click', toggleSearch);
      dom.themeBtn.addEventListener('click', toggleTheme);
      dom.exportBtn.addEventListener('click', exportBoard);
      dom.importBtn.addEventListener('click', () => dom.fileInput.click());
      dom.fileInput.addEventListener('change', (e) => { importBoard(e.target.files[0]); e.target.value = ''; });

      // ========== FIX: Define toggleFontPanel ==========
      let fontPanelOpen = false;
      function toggleFontPanel() {
        fontPanelOpen = !fontPanelOpen;
        dom.fontPanel.classList.toggle('open', fontPanelOpen);
        dom.fontMgrBtn.classList.toggle('active', fontPanelOpen);
      }

      // Hamburger menu
      let hamburgerOpen = false;
      let hamburgerToggleTimer = null; // debounce for double-tap

      function toggleHamburger() {
        if (hamburgerToggleTimer) return;
        hamburgerToggleTimer = setTimeout(() => { hamburgerToggleTimer = null; }, 300);
        hamburgerOpen = !hamburgerOpen;
        dom.hamburgerMenu.classList.toggle('open', hamburgerOpen);
        dom.hamburgerBtn.classList.toggle('active', hamburgerOpen);
      }

      function closeHamburger() {
        hamburgerOpen = false;
        dom.hamburgerMenu.classList.remove('open');
        dom.hamburgerBtn.classList.remove('active');
      }

      dom.hamburgerBtn.addEventListener('click', toggleHamburger);
      dom.hamburgerClose.addEventListener('click', closeHamburger);

      // Close hamburger menu on escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && hamburgerOpen) {
          closeHamburger();
        }
      });

      // Close hamburger menu when clicking outside
      dom.hamburgerMenu.addEventListener('click', (e) => {
        if (e.target === dom.hamburgerMenu) {
          closeHamburger();
        }
      });

      // Hamburger menu buttons
      dom.hamburgerModePan.addEventListener('click', () => { setMode('pan'); closeHamburger(); });
      dom.hamburgerModeCreate.addEventListener('click', () => { setMode('create'); closeHamburger(); });
      dom.hamburgerZoomIn.addEventListener('click', () => { zoomIn(); closeHamburger(); });
      dom.hamburgerZoomOut.addEventListener('click', () => { zoomOut(); closeHamburger(); });
      dom.hamburgerFit.addEventListener('click', () => { fitToScreen(); closeHamburger(); });
      dom.hamburgerReset.addEventListener('click', () => { resetView(); closeHamburger(); });
      dom.hamburgerUndo.addEventListener('click', () => { undo(); closeHamburger(); });
      dom.hamburgerRedo.addEventListener('click', () => { redo(); closeHamburger(); });
      dom.hamburgerSearch.addEventListener('click', () => { toggleSearch(); closeHamburger(); });
      dom.hamburgerFontMgr.addEventListener('click', () => { toggleFontPanel(); closeHamburger(); }); // Now defined
      dom.hamburgerTheme.addEventListener('click', () => { toggleTheme(); closeHamburger(); });
      dom.hamburgerExport.addEventListener('click', () => { exportBoard(); closeHamburger(); });
      dom.hamburgerImport.addEventListener('click', () => { dom.fileInput.click(); closeHamburger(); });

      // Add touch events for toolbar buttons
      [dom.undoBtn, dom.redoBtn, dom.zoomInBtn, dom.zoomOutBtn, dom.fitBtn, dom.resetBtn,
       dom.modePan, dom.modeCreate, dom.toolboxBtn, dom.searchBtn, dom.themeBtn,
       dom.exportBtn, dom.importBtn, dom.mobileToolboxClose, dom.hamburgerBtn, dom.hamburgerClose].forEach(btn => {
        if (btn) {
          btn.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
          // Add touchend handlers for buttons that need click functionality on mobile
          if (btn === dom.modePan) {
            btn.addEventListener('touchend', () => setMode('pan'), { passive: false });
          } else if (btn === dom.modeCreate) {
            btn.addEventListener('touchend', () => setMode('create'), { passive: false });
          } else if (btn === dom.toolboxBtn) {
            btn.addEventListener('touchend', toggleToolbox, { passive: false });
          } else if (btn === dom.searchBtn) {
            btn.addEventListener('touchend', toggleSearch, { passive: false });
          } else if (btn === dom.themeBtn) {
            btn.addEventListener('touchend', toggleTheme, { passive: false });
          } else if (btn === dom.exportBtn) {
            btn.addEventListener('touchend', exportBoard, { passive: false });
          } else if (btn === dom.importBtn) {
            btn.addEventListener('touchend', () => dom.fileInput.click(), { passive: false });
          } else if (btn === dom.undoBtn) {
            btn.addEventListener('touchend', undo, { passive: false });
          } else if (btn === dom.redoBtn) {
            btn.addEventListener('touchend', redo, { passive: false });
          } else if (btn === dom.zoomInBtn) {
            btn.addEventListener('touchend', zoomIn, { passive: false });
          } else if (btn === dom.zoomOutBtn) {
            btn.addEventListener('touchend', zoomOut, { passive: false });
          } else if (btn === dom.fitBtn) {
            btn.addEventListener('touchend', fitToScreen, { passive: false });
          } else if (btn === dom.resetBtn) {
            btn.addEventListener('touchend', resetView, { passive: false });
          } else if (btn === dom.mobileToolboxClose) {
            btn.addEventListener('touchend', () => {
              mobileToolboxOpen = false;
              dom.mobileToolbox.classList.remove('open');
              dom.toolboxBtn.classList.remove('active');
            }, { passive: false });
          } else if (btn === dom.hamburgerBtn) {
            // Already has click; touchend might cause double, but we debounced toggle
            btn.addEventListener('touchend', toggleHamburger, { passive: false });
          } else if (btn === dom.hamburgerClose) {
            btn.addEventListener('touchend', closeHamburger, { passive: false });
          }
        }
      });

      // Add touch events for hamburger menu buttons
      [dom.hamburgerModePan, dom.hamburgerModeCreate, dom.hamburgerZoomIn, dom.hamburgerZoomOut,
       dom.hamburgerFit, dom.hamburgerReset, dom.hamburgerUndo, dom.hamburgerRedo,
       dom.hamburgerSearch, dom.hamburgerFontMgr, dom.hamburgerTheme, dom.hamburgerExport, dom.hamburgerImport].forEach(btn => {
        if (btn) {
          btn.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
          // Touchend handlers are already added above
        }
      });

      // Format bar
      dom.formatBar.querySelectorAll('[data-cmd]').forEach(btn => {
        btn.addEventListener('mousedown', e => e.preventDefault());
        btn.addEventListener('click', e => execFormat(btn.dataset.cmd));
        btn.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
        btn.addEventListener('touchend', e => execFormat(btn.dataset.cmd), { passive: false });
      });
      dom.fmtFontFamily.addEventListener('change', e => applyFontFamily(e.target.value));
      dom.fmtFontSize.addEventListener('change', e => applyFontSize(parseInt(e.target.value)));
      dom.fmtTextColor.addEventListener('input', e => applyTextColor(e.target.value));

      // Search panel
      dom.spInput.addEventListener('input', throttle(runSearch, 200));
      dom.spInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.shiftKey ? searchCursor-- : searchCursor++; highlightSearch(); }
        if (e.key === 'Escape') closeSearch();
      });
      dom.spClose.addEventListener('click', closeSearch);
      dom.spClose.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
      dom.spClose.addEventListener('touchend', closeSearch, { passive: false });

      function applyColorToNote(id, color) {
        const note = S.notes.get(id);
        if (!note) return;
        note.color = color;
        note.el.style.setProperty('--box-accent', color);
        note.el.querySelector('.note-color-dot').style.background = color;
        pushHistory();
        scheduleAutoSave();
      }

      // Global font

        S.defaultFont = dom.globalFont.value;

            note.font = S.defaultFont;
            note.el.style.fontFamily = S.defaultFont;
            pushHistory();
            scheduleAutoSave();
          }
        }
      });

      // Mobile toolbox events
      dom.mobilePresetColors.querySelectorAll('.color-swatch').forEach(sw => {
        sw.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
        sw.addEventListener('touchend', () => {
          dom.mobilePresetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          sw.classList.add('active');
          S.selectedColor = sw.dataset.color;
          dom.mobileCustomColor.value = sw.dataset.color;
          dom.customColor.value = sw.dataset.color; // Sync with desktop
          dom.presetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          dom.presetColors.querySelector(`[data-color="${sw.dataset.color}"]`).classList.add('active');
          if (S.selectedIds.size === 1) {
            const id = Array.from(S.selectedIds)[0];

          }
        }, { passive: false });
        sw.addEventListener('click', () => {
          dom.mobilePresetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          sw.classList.add('active');
          S.selectedColor = sw.dataset.color;
          dom.mobileCustomColor.value = sw.dataset.color;
          dom.customColor.value = sw.dataset.color; // Sync with desktop
          dom.presetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          dom.presetColors.querySelector(`[data-color="${sw.dataset.color}"]`).classList.add('active');
          if (S.selectedIds.size === 1) {
            const id = Array.from(S.selectedIds)[0];
            applyColorToNote(id, S.selectedColor);
          }
        });
      });
      dom.mobileCustomColor.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
      dom.mobileCustomColor.addEventListener('input', () => {
        S.selectedColor = dom.mobileCustomColor.value;
        dom.customColor.value = dom.mobileCustomColor.value; // Sync with desktop
        dom.mobilePresetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        dom.presetColors.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        if (S.selectedIds.size === 1) {
          const id = Array.from(S.selectedIds)[0];
          applyColorToNote(id, S.selectedColor);
        }
      });
      dom.mobileGlobalFont.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
      dom.mobileGlobalFont.addEventListener('change', () => {
        S.defaultFont = dom.mobileGlobalFont.value;
        dom.globalFont.value = dom.mobileGlobalFont.value; // Sync with desktop
        if (S.selectedIds.size === 1) {
          const id = Array.from(S.selectedIds)[0];
          const note = S.notes.get(id);
          if (note) {
            note.font = S.defaultFont;
            note.el.style.fontFamily = S.defaultFont;
            pushHistory();
            scheduleAutoSave();
